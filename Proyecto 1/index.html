<!DOCTYPE html>
<html lang="en">
<head> 
    <link rel="stylesheet" href="login.css">
    <script src="index.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <div class="ContainerdelloG">
    <header>
        <h1>Login</h1>
    </header>
    <form id="loginForm">
    <input
        type="text"
        id="username"
        placeholder="Usuario"
        required>

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
        required>

    <button type="submit">
        Ingresar
    </button>
</div>
</form>
</body>
</html>

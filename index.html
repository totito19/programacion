<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labubu</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #f7f7f7;
      color: #111;
    }

    /* Contenedor */
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    /* Navbar */
    nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 60px;
    }

    nav a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
    }

    nav a:hover {
      color: #000;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    /* Cards */
    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid #eee;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Botón */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border: 1px solid #111;
      border-radius: 20px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #111;
      color: white;
    }

    /* Footer */
    footer {
      margin-top: 80px;
      text-align: center;
      font-size: 14px;
      color: #999;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- Navbar -->
    <nav>
      <div><strong>Labubu</strong></div>
      <a href="#">Inicio</a>
    </nav>

    <!-- Hero -->
    <div class="hero">
      <h1>Página principal</h1>
      <p>Seleccioná un ejercicio para continuar</p>
    </div>

    <!-- Cards -->
    <div class="grid">

      <div class="card">
        <h3>Ejercicio 1</h3>
        <a href="ej1/index.html" class="btn">Abrir</a>
      </div>

      <div class="card">
        <h3>Ejercicio 2</h3>
        <a href="ej2/index.html" class="btn">Abrir</a>
      </div>

      <div class="card">
        <h3>Ejercicio 3</h3>
        <a href="ej3/index.html" class="btn">Abrir</a>
      </div>

    </div>

    <!-- Footer -->
    <footer>
      © 2026 - Labubu
    </footer>

  </div>

</body>
</html>
